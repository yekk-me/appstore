additionalProperties:
  formFields:
    # Cloudflare 配置
    - default: ""
      envKey: CLOUDFLARE_TUNNEL_TOKEN
      label:
        en: Cloudflare Tunnel Token
        zh: Cloudflare Tunnel 令牌
        zh-Hant: Cloudflare Tunnel 令牌
      required: true
      type: password
    - default: ""
      envKey: CLOUDFLARE_DOMAIN
      label:
        en: Domain (e.g. mytesla.example.com)
        zh: 域名 (例如 mytesla.example.com)
        zh-Hant: 域名 (例如 mytesla.example.com)
      required: true
      rule: paramCommon
      type: text

    # Basic Auth 配置
    - default: "admin"
      envKey: BASIC_AUTH_USER
      label:
        en: TeslaMate Username
        zh: TeslaMate 用户名
        zh-Hant: TeslaMate 用戶名
      required: true
      rule: paramCommon
      type: text
    - default: "admin"
      envKey: BASIC_AUTH_PASS
      label:
        en: TeslaMate Password
        zh: TeslaMate 密码
        zh-Hant: TeslaMate 密碼
      random: true
      required: true
      rule: paramComplexity
      type: password

    # TeslaMateAPI 配置
    - default: "api_token"
      envKey: API_TOKEN
      label:
        en: API Token (for TeslaMateAPI security)
        zh: API 令牌 (用于 TeslaMateAPI 安全)
        zh-Hant: API 令牌 (用於 TeslaMateAPI 安全)
      random: true
      required: true
      rule: paramComplexity
      type: password

    # 数据库配置（使用内置 PostgreSQL）
    - default: teslamate
      envKey: TM_DB_NAME
      label:
        en: Database Name
        zh: 数据库名
        zh-Hant: 資料庫名稱
      random: true
      required: true
      rule: paramComplexity
      type: text
    - default: teslamate
      envKey: TM_DB_USER
      label:
        en: Database User
        zh: 数据库用户
        zh-Hant: 資料庫使用者
      random: true
      required: true
      rule: paramComplexity
      type: text
    - default: teslamate
      envKey: TM_DB_PASS
      label:
        en: Database Password
        zh: 数据库密码
        zh-Hant: 資料庫密碼
      random: true
      required: true
      rule: paramComplexity
      type: password

    # TeslaMate 配置
    - default: "secret"
      envKey: TM_ENCRYPTION_KEY
      label:
        en: Encryption Key
        zh: 加密密钥
        zh-Hant: 加密密鑰
      random: true
      required: true
      rule: paramComplexity
      type: password

    # 端口配置
    - default: 80
      edit: true
      envKey: TRAEFIK_HTTP_PORT
      label:
        en: Traefik HTTP Port
        zh: Traefik HTTP 端口
        zh-Hant: Traefik HTTP 埠
      required: true
      rule: paramPort
      type: number

    # Grafana 配置
    - default: admin
      envKey: GRAFANA_USER
      label:
        en: Grafana Admin User
        zh: Grafana 管理员用户
        zh-Hant: Grafana 管理員用戶
      required: true
      rule: paramCommon
      type: text
    - default: admin
      envKey: GRAFANA_PW
      label:
        en: Grafana Admin Password
        zh: Grafana 管理员密码
        zh-Hant: Grafana 管理員密碼
      random: true
      required: true
      rule: paramComplexity
      type: password

    # 时区配置
    - default: Asia/Shanghai
      envKey: TZ
      label:
        en: Timezone
        zh: 时区
        zh-Hant: 時區
      required: true
      type: select
      values:
        - label: Asia/Shanghai
          value: Asia/Shanghai
        - label: UTC
          value: UTC
        - label: America/New_York
          value: America/New_York
        - label: Europe/London
          value: Europe/London
        - label: Europe/Berlin
          value: Europe/Berlin
        - label: Asia/Tokyo
          value: Asia/Tokyo
