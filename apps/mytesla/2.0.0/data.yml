additionalProperties:
  formFields:
    # Tailscale 配置
    - default: ""
      envKey: TS_AUTHKEY
      label:
        en: Tailscale Auth Key
        zh: Tailscale 认证密钥
        zh-Hant: Tailscale 認證密鑰
      required: true
      rule: paramCommon
      type: password
    - default: ""
      envKey: TS_TAILNET_NAME
      label:
        en: Tailscale Tailnet Name (e.g. your-name.ts.net)
        zh: Tailscale Tailnet 名称 (例如 your-name.ts.net)
        zh-Hant: Tailscale Tailnet 名稱 (例如 your-name.ts.net)
      required: true
      rule: paramCommon
      type: text

    # TeslaMateAPI 配置
    - default: ""
      envKey: API_TOKEN
      label:
        en: API Token (for TeslaMateAPI security)
        zh: API 令牌 (用于 TeslaMateAPI 安全)
        zh-Hant: API 令牌 (用於 TeslaMateAPI 安全)
      random: true
      required: true
      rule: paramComplexity
      type: password

    # 数据库配置（使用内置 PostgreSQL）
    - default: teslamate
      envKey: TM_DB_NAME
      label:
        en: Database Name
        zh: 数据库名
        zh-Hant: 資料庫名稱
      random: true
      required: true
      rule: paramComplexity
      type: text
    - default: teslamate
      envKey: TM_DB_USER
      label:
        en: Database User
        zh: 数据库用户
        zh-Hant: 資料庫使用者
      random: true
      required: true
      rule: paramComplexity
      type: text
    - default: teslamate
      envKey: TM_DB_PASS
      label:
        en: Database Password
        zh: 数据库密码
        zh-Hant: 資料庫密碼
      random: true
      required: true
      rule: paramComplexity
      type: password

    # TeslaMate 配置
    - default: "secret"
      envKey: TM_ENCRYPTION_KEY
      label:
        en: Encryption Key
        zh: 加密密钥
        zh-Hant: 加密密鑰
      random: true
      required: true
      rule: paramComplexity
      type: password

    # 端口配置
    - default: 4000
      edit: true
      envKey: PANEL_APP_PORT_HTTP
      label:
        en: TeslaMate Port
        zh: TeslaMate 端口
        zh-Hant: TeslaMate 埠
      required: true
      rule: paramPort
      type: number
    - default: 3000
      edit: true
      envKey: GRAFANA_PORT
      label:
        en: Grafana Port
        zh: Grafana 端口
        zh-Hant: Grafana 埠
      required: true
      rule: paramPort
      type: number
    - default: 8080
      edit: true
      envKey: API_PORT
      label:
        en: TeslaMateAPI Port
        zh: TeslaMateAPI 端口
        zh-Hant: TeslaMateAPI 埠
      required: true
      rule: paramPort
      type: number

    # Grafana 配置
    - default: admin
      envKey: GRAFANA_USER
      label:
        en: Grafana Admin User
        zh: Grafana 管理员用户
        zh-Hant: Grafana 管理員用戶
      required: true
      rule: paramCommon
      type: text
    - default: admin
      envKey: GRAFANA_PW
      label:
        en: Grafana Admin Password
        zh: Grafana 管理员密码
        zh-Hant: Grafana 管理員密碼
      random: true
      required: true
      rule: paramComplexity
      type: password

    # 时区配置
    - default: Asia/Shanghai
      envKey: TZ
      label:
        en: Timezone
        zh: 时区
        zh-Hant: 時區
      required: true
      type: select
      values:
        - label: Asia/Shanghai
          value: Asia/Shanghai
        - label: UTC
          value: UTC
        - label: America/New_York
          value: America/New_York
        - label: Europe/London
          value: Europe/London
        - label: Europe/Berlin
          value: Europe/Berlin
        - label: Asia/Tokyo
          value: Asia/Tokyo